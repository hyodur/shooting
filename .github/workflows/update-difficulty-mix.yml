name: Update difficulty problem mix

on:
  push:
    paths:
      - .github/workflows/update-difficulty-mix.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply difficulty mix
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/App.tsx')
          source = path.read_text(encoding='utf-8')
          changes = [
            (
              'function generateProblem(difficulty: Difficulty): Problem {\n  const operation = pick<Operation>(["addition", "subtraction"]);',
              'function shouldRequireCarryOrBorrow(difficulty: Difficulty, enemyIndex: number) {\n  if (difficulty === "easy") return false;\n  if (difficulty === "hard") return true;\n  return enemyIndex % 2 === 1;\n}\n\nfunction generateProblem(difficulty: Difficulty, enemyIndex = 0): Problem {\n  const requiresCarryOrBorrow = shouldRequireCarryOrBorrow(difficulty, enemyIndex);\n  const operation = pick<Operation>(["addition", "subtraction"]);'
            ),
            ('const carry = difficulty !== "easy";', 'const carry = requiresCarryOrBorrow;'),
            ('const borrow = difficulty !== "easy";', 'const borrow = requiresCarryOrBorrow;'),
            ('useState(() => generateProblem("easy"))', 'useState(() => generateProblem("easy", 0))'),
            (
              'function reset(newDifficulty = difficulty) { setProblem(generateProblem(newDifficulty));',
              'function reset(newDifficulty = difficulty, enemyIndex = shot) { setProblem(generateProblem(newDifficulty, enemyIndex));'
            ),
            ('reset(difficulty); }', 'reset(difficulty, 0); }'),
            ('else { reset(); setFeedback("새 적이 나타났어요.', 'else { reset(difficulty, nextShot); setFeedback("새 적이 나타났어요.'),
            (
              '<span className="block text-2xl font-black">{labels[d]} <span className="text-base text-indigo-700">{d === "easy" ? "×1.0" : d === "normal" ? "×1.4" : "×1.8"}</span></span><span className="mt-2 block text-base text-slate-600">{d === "easy" ? "받아올림, 받아내림 없이 계산해요." : d === "normal" ? "한 번 받아올림이나 받아내림을 연습해요." : "60분과 1시간 관계를 더 꼼꼼히 살펴봐요."}</span>',
              '<span className="block text-2xl font-black">{labels[d]}</span><span className="mt-2 block text-base text-slate-600">{d === "easy" ? "받아올림, 받아내림 없이 계산해요." : d === "normal" ? "변환 없는 문제 5개와 있는 문제 5개를 풀어요." : "모든 문제에서 받아올림이나 받아내림을 연습해요."}</span>'
            ),
            (
              '적 비행기가 나타나면 문제를 풀어요. 빠르고 정확할수록 점수가 높아지고, 어려운 단계에는 더 큰 배율이 적용돼요.',
              '적 비행기가 나타나면 문제를 풀어요. 빠르고 정확할수록 점수가 높아져요.'
            ),
            (
              '${penaltyText} · ${labels[difficulty]} ×${earned.difficultyMultiplier})',
              '${penaltyText})'
            ),
          ]
          for old, new in changes:
            count = source.count(old)
            if count != 1:
              raise RuntimeError(f'Expected one match, found {count}: {old[:80]}')
            source = source.replace(old, new)
          path.write_text(source, encoding='utf-8')
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "Differentiate difficulty problem mixes"
          git push
