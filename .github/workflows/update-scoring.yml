name: Update scoring system

on:
  push:
    paths:
      - .github/workflows/update-scoring.yml

permissions:
  contents: write

jobs:
  update-scoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply scoring changes
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/App.tsx")
          source = path.read_text(encoding="utf-8")

          old_score = '''function scoreFor(elapsed: number, streak: number, mistakes: number) {
            const speed = Math.max(0, 120 - Math.floor((elapsed / 1000) * 6));
            const combo = Math.min(120, streak * 15);
            return Math.max(20, 100 + speed + combo - mistakes * 35);
          }'''
          new_score = '''function scoreFor(elapsed: number, streak: number, mistakes: number, difficulty: Difficulty) {
            const elapsedSeconds = elapsed / 1000;
            const speed =
              elapsedSeconds <= 5 ? 150 :
              elapsedSeconds <= 10 ? 110 :
              elapsedSeconds <= 15 ? 70 :
              elapsedSeconds <= 20 ? 35 : 0;
            const combo = Math.min(160, Math.max(0, streak - 1) * 20);
            const accuracyPenalty = mistakes * 60;
            const difficultyMultiplier = difficulty === "hard" ? 1.8 : difficulty === "normal" ? 1.4 : 1;
            const total = Math.max(20, Math.round((100 + speed + combo - accuracyPenalty) * difficultyMultiplier));

            return { total, speed, combo, accuracyPenalty, difficultyMultiplier };
          }'''

          old_card = '''<span className="block text-2xl font-black">{labels[d]}</span>'''
          new_card = '''<span className="block text-2xl font-black">{labels[d]} <span className="text-base text-indigo-700">{d === "easy" ? "×1.0" : d === "normal" ? "×1.4" : "×1.8"}</span></span>'''

          old_intro = '''적 비행기가 나타나면 문제를 풀어요. 정답이면 미사일이 발사되고, 두 번 틀리면 내 비행기가 피격됩니다.'''
          new_intro = '''적 비행기가 나타나면 문제를 풀어요. 빠르고 정확할수록 점수가 높아지고, 어려운 단계에는 더 큰 배율이 적용돼요.'''

          old_earned = '''const nextStreak = streak + 1; const nextShot = shot + 1; const earned = scoreFor(Date.now() - startedAt.current, nextStreak, mistakes);
                setSolved(true); setPhase("missileHit"); setCorrect((v) => v + 1); setShot(nextShot); setScore((v) => v + earned); setStreak(nextStreak); setBest((v) => Math.max(v, nextStreak)); record(mistakes); sound(nextShot >= 10 ? "clear" : "hit"); setFeedback(`격추 성공! +${earned}점`);'''
          new_earned = '''const nextStreak = streak + 1; const nextShot = shot + 1; const earned = scoreFor(Date.now() - startedAt.current, nextStreak, mistakes, difficulty);
                const penaltyText = earned.accuracyPenalty > 0 ? ` · 정확도 -${earned.accuracyPenalty}` : "";
                setSolved(true); setPhase("missileHit"); setCorrect((v) => v + 1); setShot(nextShot); setScore((v) => v + earned.total); setStreak(nextStreak); setBest((v) => Math.max(v, nextStreak)); record(mistakes); sound(nextShot >= 10 ? "clear" : "hit"); setFeedback(`격추 성공! +${earned.total}점 (속도 +${earned.speed} · 콤보 +${earned.combo}${penaltyText} · ${labels[difficulty]} ×${earned.difficultyMultiplier})`);'''

          replacements = [
              (old_score, new_score, "score function"),
              (old_card, new_card, "difficulty card"),
              (old_intro, new_intro, "intro message"),
              (old_earned, new_earned, "earned score usage"),
          ]

          for old, new, label in replacements:
              if source.count(old) != 1:
                  raise RuntimeError(f"Expected one {label}, found {source.count(old)}")
              source = source.replace(old, new)

          path.write_text(source, encoding="utf-8")

      - name: Commit scoring changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "Make speed and difficulty scoring explicit"
          git push
